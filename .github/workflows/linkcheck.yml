name: LinkCheck

on:
  push:
    branches: ['*']
    paths: ['Blocklist.txt']
  pull_request:
    paths: ['Blocklist.txt']
  workflow_dispatch:

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
    - uses: docker://dkhamsing/awesome_bot:latest
      with:
        args: /github/workspace/Blocklist.txt --allow-redirect
